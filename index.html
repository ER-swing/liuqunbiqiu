<!-- about -->

<section class="about">

六群比丘是一支以灯光设计师为核心的现场美学团队，
长期服务于中国独立音乐现场。

团队成员来自灯光设计、调音、新媒体视觉等领域，
通过灯光、声音、影像与装置的结合，
探索音乐现场更多的表达方式。

我们相信，
灯光不仅是照亮舞台的工具，
而是一种空间语言。
